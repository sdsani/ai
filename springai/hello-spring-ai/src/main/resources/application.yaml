spring:
  ai:
    chat:
      client:
        # Observability: https://docs.spring.io/spring-ai/reference/observability/index.html
        observation:
          log-prompt: true
          log-completion: true
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5
          temperature: 1
  application:
    name: hello-spring-ai

