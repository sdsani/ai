<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Demo</title>
    <style>
        #responseArea {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 12px;
            background: #f8f9fa;
            font-family: Consolas, Monaco, monospace;
            overflow: auto;
            max-height: 800px;
        }
    </style>
</head>
<body>

<h2>Prompt Input</h2>

<label for="promptInput"></label>
<textarea id="promptInput" rows="12" cols="100">
Command to get list of all object in a bucket name foo

Sample response:
    command: aws s3 ls s3://foo
    explanation: The command to list all objects in the bucket named 'foo' is 'aws s3 ls s3://foo'.
</textarea>

<br><br>

<button id="submitBtn">Submit</button>

<h3>Response</h3>
<pre id="responseArea"></pre>

<script src="/js/app.js"></script>

</body>
</html>
