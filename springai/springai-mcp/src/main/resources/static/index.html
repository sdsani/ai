<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Demo</title>
    <style>
        #responseArea {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 12px;
            background: #f8f9fa;
            font-family: Consolas, Monaco, monospace;
            overflow: auto;
            max-height: 800px;
        }
    </style>
</head>
<body>

<h2>Prompt Input</h2>

<label for="promptInput"></label>
<textarea id="promptInput" rows="12" cols="100">
Use the Brave Search tool to search patch.com for events in Eagan, Minnesota
during July 2026.

Return:
- Event name
- Date
- Source URL
- Title
- Extra Snippet
</textarea>

<br><br>

<button id="submitBtn">Submit</button>

<h3>Response</h3>
<pre id="responseArea"></pre>

<script src="/js/app.js"></script>

</body>
</html>
